name: Auto Trend Crawler

on:
  # schedule:
  #   # 매일 UTC 기준 00:00(한국 09:00), 12:00(한국 21:00) 2회 실행
  #   - cron: '0 0,12 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    # 레포지토리 쓰기 권한 설정 (git push를 위해 필요)
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 패키지 설치 캐싱으로 속도 향상
          cache-dependency-path: 'requirements_crawler.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_crawler.txt

      - name: Run Trend Crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTIONS_ENV: true
        run: |
          python trend_crawler.py
